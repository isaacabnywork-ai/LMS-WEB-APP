name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/lms_web_app/LMS WEB APP"
          # Exclude heavy folders so the upload is fast
          exclude: ".git,node_modules,apps/web/node_modules,apps/web/.next,packages/*/node_modules,.turbo"

      - name: Build and Start on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the copied folder
            cd ~/lms_web_app/"LMS WEB APP"
            
            # Install dependencies and build
            npm install
            npm run build
            
            # Install PM2 globally if it's not already installed
            if ! command -v pm2 &> /dev/null; then
                sudo npm install -g pm2
            fi
            
            # Start or restart the Next.js app in the background
            # If the app is already running, this will restart it to apply changes
            pm2 describe lms-web > /dev/null
            if [ $? -eq 0 ]; then
                pm2 restart lms-web
            else
                pm2 start npm --name "lms-web" -- run start --workspace=web
            fi
            
            # Save the PM2 process list so it restarts if the VPS reboots
            pm2 save
