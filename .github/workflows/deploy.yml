name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/lms_web_app/LMS WEB APP"
          # Exclude heavy folders so the upload is fast
          exclude: ".git,node_modules,apps/web/node_modules,apps/web/.next,packages/*/node_modules,.turbo"

      - name: Build and Start on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load NVM so npm and pm2 commands work in this SSH session
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Navigate to the copied folder
            cd ~/lms_web_app/"LMS WEB APP"
            
            # Install dependencies and build
            npm install
            npm run build
            
            # Install PM2 globally if it's not already installed
            if ! command -v pm2 &> /dev/null; then
                npm install -g pm2
            fi
            
            # Restart the existing learn-app with updated environment variables
            pm2 restart learn-app --update-env
            
            # Save the PM2 process list so it restarts if the VPS reboots
            pm2 save
